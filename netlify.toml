# Netlify configuration for Next.js (App Router)
# Uses the official Netlify Next.js plugin to handle SSR, edge functions, and static pages.

[build]
  command = "npm run build"
  publish = ".netlify/next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Production environment placeholders — set real values in Netlify UI or via CLI
[context.production.environment]
  PA_LM_API_URL = ""
  PA_LM_API_KEY = ""

# Optional: local dev command for `netlify dev` if you use Netlify CLI
[dev]
  command = "next dev"
